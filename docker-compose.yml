services:
  # serve la build statica (dist/) su http://localhost:8080
  web:
    image: nginx:alpine
    container_name: ifacgalaxy
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # toolbox node per build, test e pipeline dati (nessun Node richiesto in locale)
  node:
    # bookworm (glibc) e non alpine (musl): così i binari nativi di esbuild/rollup
    # in node_modules restano compatibili sia con l'host sia con il container
    image: node:22-bookworm-slim
    profiles: ["tools"]
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp
      npm_config_cache: /tmp/.npm
      npm_config_update_notifier: "false"
    volumes:
      - .:/app
    ports:
      - "${DEV_PORT:-5173}:5173"
